<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos - David & Précieuse</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page page--photos">
    <main class="page__center">
      <section class="panel panel--glow">
        <p class="eyebrow">📸 Leurs souvenirs</p>
        <h1 data-typewrite="30">Les images de leur monde</h1>
        <div class="photo-grid photo-grid--stacked">
          <article class="photo-card">
            <img src="photo/david.jpg" alt="David" loading="lazy" />
            <div class="photo-card__caption">David</div>
          </article>
          <article class="photo-card">
            <img src="photo/precieuse.jpg" alt="Précieuse" loading="lazy" />
            <div class="photo-card__caption">Précieuse</div>
          </article>
          <article class="photo-card">
            <img src="photo/ensemble.jpg" alt="David et Précieuse" loading="lazy" />
            <div class="photo-card__caption">Tous les deux</div>
          </article>
        </div>
        <a class="btn btn--ghost" href="index.html"><span>Retour à l'accueil</span></a>
      </section>
    </main>
    <script src="effects.js"></script>
    <script src="script.js"></script>
  </body>
</html>
